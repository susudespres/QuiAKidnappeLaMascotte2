<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Page 2</title>

<style>
body {
    margin: 0;
    height: 100vh;
    background-image: url("img3.png");
    font-family: Arial, sans-serif;
}

.popup-btn {
    position: absolute;
    bottom: 50px;
    left: 50px;

    padding: 10px 15px;
    border-radius: 20px;
    border: none;

    background: white;
    box-shadow: 0 3px 10px rgba(0,0,0,0.3);

    font-size: 36px;

    cursor: pointer;
}

.popup {
    position: absolute;
    bottom: 90px;
    left: 50px;

    width: 200px;
    padding: 15px;

    background: white;
    border-radius: 15px;
    box-shadow: 0 5px 15px rgba(0,0,0,0.3);

    display: none;
    font-size: 36px;
}
</style>
</head>

<body>

<button class="popup-btn" onclick="togglePopup()">🔍</button>

<div class="popup" id="popup">
    Nous cherchons ici un numéro de salle de classe 😉
</div>

<script>
function togglePopup() {
    const popup = document.getElementById("popup");
    
    if (popup.style.display === "block") {
        popup.style.display = "none";
    } else {
        popup.style.display = "block";
    }
}
</script>

</body>
</html>
